<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Hipoteca - Compacto Izquierda</title>
    <style>
        :root { --azul: #1e40af; --verde: #16a34a; --bg: #f8fafc; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            margin: 8px; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }
        
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 12px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        
        .header { 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            border-bottom: 1px solid #e2e8f0; 
            padding-bottom: 10px; 
            margin-bottom: 12px; 
        }

        @media (min-width: 600px) {
            .header { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        
        .btn-sync { 
            background: #24292e; 
            color: white; 
            padding: 6px 10px; 
            border-radius: 6px; 
            border: none; 
            font-size: 0.75rem;
            flex: 1;
        }
        
        .resumen-cuota { 
            background: var(--azul); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 12px; 
        }
        .cuota-valor { font-size: 1.8rem; font-weight: bold; margin: 2px 0; }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
            margin-bottom: 12px; 
        }
        
        .card { background: white; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0; font-size: 0.6rem; color: #64748b; text-transform: uppercase; }
        .card p { margin: 2px 0; font-size: 0.9rem; font-weight: bold; }

        .formulario { 
            display: flex;
            flex-wrap: wrap;
            gap: 8px; 
            background: #f1f5f9; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
        }
        
        .campo { 
            display: flex; 
            flex-direction: column; 
            flex: 1 1 calc(50% - 8px); 
            min-width: 130px; 
        }
        
        label { font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; color: #475569; }
        
        input, select, .btn-add { 
            height: 34px; 
            padding: 0 8px; 
            border-radius: 6px; 
            border: 1px solid #cbd5e1; 
            font-size: 16px; 
            width: 100%;
            box-sizing: border-box; 
            background-color: white;
            text-align: center; /* Centrado por defecto */
        }

        /* Alineación a la izquierda específica para la Fecha */
        #fFecha {
            text-align: left;
            display: flex;
            align-items: center;
        }

        .btn-add { 
            background: var(--azul); 
            color: white; 
            border: none; 
            font-weight: bold; 
            margin-top: 4px;
            flex: 1 1 100%; 
            height: 38px;
        }

        .cloud-bar { 
            background: #f1f5f9; 
            padding: 8px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            display: flex; 
            flex-direction: column;
            gap: 6px; 
            align-items: center; 
            border: 1px dashed #cbd5e1; 
        }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; }
        th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 0.65rem; }
        
        .tipo-m { color: #2563eb; font-weight: bold; }
        .tipo-a { color: var(--verde); font-weight: bold; }
        .btn-del { color: #ef4444; background: none; border: none; padding: 2px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size: 1.2rem;">Hipoteca 175.000€</h2>
        <div style="display: flex; gap: 6px; width: 100%;">
            <button class="btn-sync" onclick="exportar()">📥 Backup</button>
            <button class="btn-sync" onclick="document.getElementById('importFile').click()">📤 Importar</button>
            <input type="file" id="importFile" style="display:none" onchange="importar(event)">
        </div>
    </div>

    <div class="cloud-bar">
        <button class="btn-sync" style="background:#2563eb; width: 100%;" onclick="pullFromGitHub()">🔄 Actualizar de GitHub (Público)</button>
    </div>

    <div class="resumen-cuota">
        <div class="cuota-valor" id="domCuota">0.00€</div>
        <div id="domDesglose" style="font-size: 0.7rem; opacity: 0.9;">Cargando...</div>
    </div>

    <div class="stats">
        <div class="card"><h3>Edu</h3><p id="domEdu">0€</p></div>
        <div class="card"><h3>Papas</h3><p id="domPapas">0€</p></div>
        <div class="card"><h3>Amortizado</h3><p id="domCap" style="color:var(--verde)">0€</p></div>
        <div class="card"><h3>Pendiente</h3><p id="domPend">0€</p></div>
    </div>

    <div class="formulario">
        <div class="campo"><label>Fecha</label><input type="date" id="fFecha"></div>
        <div class="campo"><label>Tipo</label><select id="fTipo"><option value="M">Mensual</option><option value="A">Extra</option></select></div>
        <div class="campo"><label>Pagador</label><select id="fQuien"><option>Edu</option><option>Papas</option></select></div>
        <div class="campo"><label>Importe</label><input type="number" id="fMonto" step="0.01" inputmode="decimal"></div>
        <button class="btn-add" onclick="agregar()">Añadir Registro</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr><th>Fecha</th><th>Paga</th><th>Tipo</th><th>Euros</th><th>Cap.</th><th></th></tr>
            </thead>
            <tbody id="domTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const C_INI = 175000;
    const I_ANUAL = 0.015;
    const PLAZO_MESES = 360;
    const JSON_URL = "https://antoniodetm.github.io/prestamo/datos.json";
    
    let registros = JSON.parse(localStorage.getItem('hipoteca_db_local')) || [];

    window.onload = () => { pullFromGitHub(true); };

    async function pullFromGitHub(isAuto = false) {
        try {
            const response = await fetch(JSON_URL + "?t=" + Date.now());
            if (response.ok) {
                const data = await response.json();
                if (data && data.length > 0) {
                    registros = data;
                    actualizar();
                }
            }
        } catch (e) { console.log("Offline"); }
    }

    function actualizar() {
        localStorage.setItem('hipoteca_db_local', JSON.stringify(registros));
        registros.sort((a, b) => new Date(a.f) - new Date(b.f));

        let deuda = C_INI;
        let sEdu = 0, sPapas = 0, sCap = 0, mesesPagados = 0;
        const tabla = document.getElementById('domTabla');
        tabla.innerHTML = "";

        registros.forEach(r => {
            let intMes = 0, amort = 0;
            if (r.t === 'A') {
                amort = r.i;
            } else {
                intMes = (deuda * I_ANUAL) / 12;
                amort = r.i - intMes;
                mesesPagados++;
            }
            deuda -= amort;
            if (r.p === 'Edu') sEdu += r.i; else sPapas += r.i;
            sCap += amort;

            const tr = `<tr>
                <td>${r.f.split('-').reverse().slice(0,2).join('/')}</td>
                <td>${r.p}</td>
                <td class="${r.t == 'M' ? 'tipo-m' : 'tipo-a'}">${r.t == 'M' ? 'M' : 'E'}</td>
                <td>${r.i.toFixed(0)}€</td>
                <td style="color:var(--verde)">${amort.toFixed(0)}€</td>
                <td><button class="btn-del" onclick="borrar(${r.id})">✕</button></td>
            </tr>`;
            tabla.insertAdjacentHTML('afterbegin', tr);
        });

        const mesesRest = PLAZO_MESES - mesesPagados;
        const tasaM = I_ANUAL / 12;
        let cuota = 0;
        if (mesesRest > 0 && deuda > 0) {
            cuota = (deuda * tasaM * Math.pow(1 + tasaM, mesesRest)) / (Math.pow(1 + tasaM, mesesRest) - 1);
        }

        document.getElementById('domCuota').innerText = cuota.toFixed(2) + "€";
        document.getElementById('domDesglose').innerHTML = `Int: ${(deuda * tasaM).toFixed(2)}€ | Cap: ${(cuota - (deuda * tasaM)).toFixed(2)}€ | ${mesesRest} m.`;
        document.getElementById('domEdu').innerText = Math.round(sEdu).toLocaleString() + "€";
        document.getElementById('domPapas').innerText = Math.round(sPapas).toLocaleString() + "€";
        document.getElementById('domCap').innerText = Math.round(sCap).toLocaleString() + "€";
        document.getElementById('domPend').innerText = Math.round(deuda).toLocaleString() + "€";
    }

    function agregar() {
        const f = document.getElementById('fFecha').value;
        const m = parseFloat(document.getElementById('fMonto').value);
        if (!f || isNaN(m)) return;
        registros.push({ id: Date.now(), f: f, p: document.getElementById('fQuien').value, t: document.getElementById('fTipo').value, i: m });
        actualizar();
        document.getElementById('fMonto').value = "";
    }

    function borrar(id) {
        if (confirm("¿Borrar?")) { registros = registros.filter(r => r.id !== id); actualizar(); }
    }

    function exportar() {
        const blob = new Blob([JSON.stringify(registros, null, 2)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "datos.json";
        a.click();
    }

    function importar(e) {
        const reader = new FileReader();
        reader.onload = (event) => { try { registros = JSON.parse(event.target.result); actualizar(); } catch (err) {} };
        reader.readAsText(e.target.files[0]);
    }

    document.getElementById('fFecha').valueAsDate = new Date();
</script>
</body>
</html>
