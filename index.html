<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control Hipoteca - Cloud Sync</title>
    <style>
        :root { --azul: #1e40af; --verde: #16a34a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 20px; color: #1e293b; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; }
        .btn-sync { background: #24292e; color: white; padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; }
        
        .resumen-cuota { background: var(--azul); color: white; padding: 25px; border-radius: 10px; text-align: center; margin-bottom: 25px; }
        .cuota-valor { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .card p { margin: 8px 0 0; font-size: 1.25rem; font-weight: bold; }

        .formulario { display: flex; gap: 10px; flex-wrap: wrap; background: #f1f5f9; padding: 20px; border-radius: 10px; align-items: flex-end; margin-bottom: 25px; }
        .campo { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #475569; }
        input, select, .btn-add { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        .btn-add { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }

        .cloud-bar { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; border: 1px dashed #cbd5e1; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 0.75rem; }
        .tipo-m { color: #2563eb; font-weight: bold; }
        .tipo-a { color: var(--verde); font-weight: bold; }
        .btn-del { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Hipoteca 175.000€</h2>
        <div style="display: flex; gap: 5px;">
            <button class="btn-sync" onclick="exportar()">📥 Backup JSON</button>
            <button class="btn-sync" onclick="document.getElementById('importFile').click()">📤 Importar</button>
            <input type="file" id="importFile" style="display:none" onchange="importar(event)">
        </div>
    </div>

    <div class="cloud-bar">
        <span style="font-size: 0.8rem; font-weight: bold;">GITHUB CLOUD:</span>
        <button class="btn-sync" style="background:#2563eb" onclick="pullFromGitHub()">🔄 Cargar de GitHub (Público)</button>
        <small id="lastUpdate" style="color:#64748b"></small>
    </div>

    <div class="resumen-cuota">
        <div style="font-size: 0.9rem; opacity: 0.8;">PRÓXIMA CUOTA MENSUAL</div>
        <div class="cuota-valor" id="domCuota">0.00€</div>
        <div id="domDesglose" style="font-size: 0.9rem;">Cargando datos...</div>
    </div>

    <div class="stats">
        <div class="card"><h3>Total Edu</h3><p id="domEdu">0€</p></div>
        <div class="card"><h3>Total Papas</h3><p id="domPapas">0€</p></div>
        <div class="card"><h3>Capital Amortizado</h3><p id="domCap" style="color:var(--verde)">0€</p></div>
        <div class="card"><h3>Deuda Pendiente</h3><p id="domPend" style="color:#f59e0b">175.000€</p></div>
    </div>

    <div class="formulario">
        <div class="campo"><label>Fecha</label><input type="date" id="fFecha"></div>
        <div class="campo"><label>Pagador</label><select id="fQuien"><option>Edu</option><option>Papas</option></select></div>
        <div class="campo"><label>Tipo</label><select id="fTipo"><option value="M">Mensualidad</option><option value="A">Anticipo</option></select></div>
        <div class="campo"><label>Importe (€)</label><input type="number" id="fMonto" step="0.01"></div>
        <button class="btn-add" onclick="agregar()">Añadir Registro</button>
    </div>

    <table>
        <thead>
            <tr><th>Fecha</th><th>Pagador</th><th>Tipo</th><th>Importe</th><th>Interés</th><th>Capital</th><th></th></tr>
        </thead>
        <tbody id="domTabla"></tbody>
    </table>
</div>

<script>
    const C_INI = 175000;
    const I_ANUAL = 0.015;
    const PLAZO_MESES = 360;
    const JSON_URL = "https://antoniodetm.github.io/prestamo/datos.json";
    
    let registros = JSON.parse(localStorage.getItem('hipoteca_db_local')) || [];

    // Cargar datos de GitHub automáticamente al abrir (Lectura pública)
    window.onload = () => {
        pullFromGitHub(true); // 'true' para que no alerte si falla al inicio
    };

    async function pullFromGitHub(isAuto = false) {
        try {
            // Añadimos un timestamp para evitar caché del móvil
            const response = await fetch(JSON_URL + "?t=" + Date.now());
            if (response.ok) {
                const data = await response.json();
                if (data && data.length > 0) {
                    registros = data;
                    actualizar();
                    if(!isAuto) alert("Datos actualizados desde GitHub");
                }
            }
        } catch (e) {
            console.log("Error cargando de GitHub:", e);
            if(!isAuto) alert("No se pudo conectar con GitHub");
        }
    }

    function actualizar() {
        localStorage.setItem('hipoteca_db_local', JSON.stringify(registros));
        registros.sort((a, b) => new Date(a.f) - new Date(b.f));

        let deuda = C_INI;
        let sEdu = 0, sPapas = 0, sCap = 0, mesesPagados = 0;
        const tabla = document.getElementById('domTabla');
        tabla.innerHTML = "";

        registros.forEach(r => {
            let intMes = 0, amort = 0;
            if (r.t === 'A') {
                amort = r.i;
            } else {
                intMes = (deuda * I_ANUAL) / 12;
                amort = r.i - intMes;
                mesesPagados++;
            }
            deuda -= amort;
            if (r.p === 'Edu') sEdu += r.i; else sPapas += r.i;
            sCap += amort;

            const tr = `<tr>
                <td>${r.f}</td>
                <td>${r.p}</td>
                <td class="${r.t == 'M' ? 'tipo-m' : 'tipo-a'}">${r.t == 'M' ? 'MENSUAL' : 'ANTICIPO'}</td>
                <td>${r.i.toFixed(2)}€</td>
                <td style="color:#ef4444">-${intMes.toFixed(2)}€</td>
                <td style="color:var(--verde); font-weight:bold">${amort.toFixed(2)}€</td>
                <td><button class="btn-del" onclick="borrar(${r.id})">✕</button></td>
            </tr>`;
            tabla.insertAdjacentHTML('afterbegin', tr);
        });

        const mesesRest = PLAZO_MESES - mesesPagados;
        const tasaM = I_ANUAL / 12;
        let cuota = 0;
        if (mesesRest > 0 && deuda > 0) {
            cuota = (deuda * tasaM * Math.pow(1 + tasaM, mesesRest)) / (Math.pow(1 + tasaM, mesesRest) - 1);
        }

        document.getElementById('domCuota').innerText = cuota.toFixed(2) + "€";
        document.getElementById('domDesglose').innerHTML = `Interés: ${(deuda * tasaM).toFixed(2)}€ | Amortización: ${(cuota - (deuda * tasaM)).toFixed(2)}€ | Restan ${mesesRest} meses`;
        document.getElementById('domEdu').innerText = sEdu.toLocaleString() + "€";
        document.getElementById('domPapas').innerText = sPapas.toLocaleString() + "€";
        document.getElementById('domCap').innerText = sCap.toLocaleString() + "€";
        document.getElementById('domPend').innerText = deuda.toLocaleString(undefined, {minimumFractionDigits: 2}) + "€";
    }

    function agregar() {
        const f = document.getElementById('fFecha').value;
        const m = parseFloat(document.getElementById('fMonto').value);
        if (!f || isNaN(m) || m <= 0) return alert("Revisa la fecha y el importe");

        registros.push({
            id: Date.now(),
            f: f,
            p: document.getElementById('fQuien').value,
            t: document.getElementById('fTipo').value,
            i: m
        });

        actualizar();
        document.getElementById('fMonto').value = "";
        alert("Guardado en local. Recuerda exportar si quieres actualizar el archivo en GitHub.");
    }

    function borrar(id) {
        if (confirm("¿Borrar registro?")) {
            registros = registros.filter(r => r.id !== id);
            actualizar();
        }
    }

    function exportar() {
        const blob = new Blob([JSON.stringify(registros, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "datos.json";
        a.click();
    }

    function importar(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                registros = JSON.parse(event.target.result);
                actualizar();
            } catch (err) { alert("Archivo no válido"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    document.getElementById('fFecha').valueAsDate = new Date();
</script>
</body>
</html>
