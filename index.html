<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipoteca Edu - Corregido</title>
    <style>
        :root { --primary: #1e40af; --secondary: #64748b; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 20px; color: #1e293b; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .card h3 { margin: 0; font-size: 0.7em; color: var(--secondary); text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 1.3em; font-weight: bold; }
        .next-box { background: var(--primary); color: white; padding: 20px; border-radius: 12px; text-align: center; }
        .next-box .amount { font-size: 2.2em; font-weight: bold; margin: 5px 0; }
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 25px; align-items: flex-end; border: 1px solid #e2e8f0; }
        .form-group div { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
        label { font-size: 0.8em; font-weight: bold; margin-bottom: 5px; }
        input, select, button { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        .btn { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; padding: 10px 15px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-exp { background: #24292e; color: white; }
        .btn-sync { background: #fff; border: 1px solid #cbd5e1; color: var(--secondary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        th { background: #f8fafc; color: var(--secondary); text-transform: uppercase; font-size: 0.7em; }
        .t-m { color: #2563eb; font-weight: bold; }
        .t-a { color: var(--success); font-weight: bold; }
        #status { font-size: 0.75em; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-err { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0">Hipoteca 175k (1,5%)</h2>
            <span id="status" class="status-err">Esperando datos...</span>
        </div>
        <div class="btn-group">
            <button class="btn btn-sync" onclick="document.getElementById('fileLoader').click()">📂 Cargar local</button>
            <button class="btn btn-exp" onclick="exportarJSON()">📥 Guardar datos.json</button>
            <input type="file" id="fileLoader" style="display:none" onchange="importarLocal(event)">
        </div>
    </div>
    
    <div class="dashboard">
        <div class="stats">
            <div class="card"><h3>Total Edu</h3><p id="tEdu">0€</p></div>
            <div class="card"><h3>Total Papas</h3><p id="tPapas">0€</p></div>
            <div class="card" style="border-left:4px solid var(--success)"><h3>Amortizado Real</h3><p id="tCap" style="color:var(--success)">0€</p></div>
            <div class="card" style="border-left:4px solid #f59e0b"><h3>Deuda Pendiente</h3><p id="tPend" style="color:#f59e0b">175.000€</p></div>
        </div>
        <div class="next-box">
            <h3>Nueva Cuota Estimada</h3>
            <div class="amount" id="valCuota">---</div>
            <div id="valDesglose" style="font-size:0.85em; opacity:0.9">Calculando...</div>
        </div>
    </div>

    <div class="form-group">
        <div><label>Fecha</label><input type="date" id="fecha"></div>
        <div><label>Pagador</label><select id="pagador"><option value="Edu">Edu</option><option value="Papas">Papas</option></select></div>
        <div><label>Tipo</label><select id="tipo"><option value="M">Mensualidad</option><option value="A">Anticipo</option></select></div>
        <div><label>Importe</label><input type="number" id="importe" step="0.01" placeholder="Ej: 603.92"></div>
        <button class="btn btn-add" onclick="registrar()">Añadir Registro</button>
    </div>

    <table>
        <thead>
            <tr><th>Fecha</th><th>Pagador</th><th>Tipo</th><th>Total</th><th>Interés</th><th>Capital</th><th>Acción</th></tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<script>
    const JSON_URL = 'https://antoniodetm.github.io/prestamo/datos.json';
    let logs = [];
    const C_INI = 175000, I_AN = 0.015, MESES_TOTAL = 360;

    async function fetchFromGitHub() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(JSON_URL + '?nocache=' + Date.now());
            if (!response.ok) throw new Error();
            logs = await response.json();
            statusEl.innerText = "● GitHub Conectado";
            statusEl.className = "status-ok";
        } catch (e) {
            statusEl.innerText = "● Modo Local / Offline";
            statusEl.className = "status-err";
            const localData = localStorage.getItem('hipoteca_db');
            if (localData) logs = JSON.parse(localData);
        }
        run();
    }

    function registrar() {
        const fechaVal = document.getElementById('fecha').value;
        const importeVal = parseFloat(document.getElementById('importe').value);
        const pagadorVal = document.getElementById('pagador').value;
        const tipoVal = document.getElementById('tipo').value;

        if (!fechaVal || isNaN(importeVal) || importeVal <= 0) {
            alert("Error: Debes poner una FECHA y un IMPORTE válido.");
            return;
        }

        const nuevoMov = {
            id: Date.now(),
            f: fechaVal,
            p: pagadorVal,
            t: tipoVal,
            i: importeVal
        };

        logs.push(nuevoMov);
        run();
        
        // Limpiar solo el importe tras añadir
        document.getElementById('importe').value = "";
    }

    function eliminar(id) {
        if(confirm("¿Seguro que quieres borrar este registro?")) {
            logs = logs.filter(l => l.id !== id);
            run();
        }
    }

    function importarLocal(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                logs = JSON.parse(ev.target.result);
                run();
                document.getElementById('status').innerText = "● Archivo Local Cargado";
            } catch (err) { alert("Archivo JSON no válido"); }
        };
        reader.readAsText(file);
    }

    function exportarJSON() {
        if (logs.length === 0) return alert("No hay datos para exportar");
        const dataStr = JSON.stringify(logs, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "datos.json";
        link.click();
    }

    function run() {
        // Guardar copia de seguridad en el navegador
        localStorage.setItem('hipoteca_db', JSON.stringify(logs));
        
        logs.sort((a, b) => new Date(a.f) - new Date(b.f));
        let deuda = C_INI, sEdu = 0, sPapas = 0, sCap = 0, mensualidades = 0;

        const html = logs.map(l => {
            let intMes = 0, amort = 0;
            if (l.t === 'A') { 
                amort = l.i; 
            } else { 
                intMes = (deuda * I_AN) / 12; 
                amort = l.i - intMes; 
                mensualidades++; 
            }
            deuda -= amort;
            if (l.p === 'Edu') sEdu += l.i; else sPapas += l.i;
            sCap += amort;
            
            return `<tr>
                <td>${l.f}</td>
                <td>${l.p}</td>
                <td class="${l.t=='M'?'t-m':'t-a'}">${l.t=='M'?'MENSUAL':'ANTICIPO'}</td>
                <td>${l.i.toFixed(2)}€</td>
                <td style="color:#ef4444">-${intMes.toFixed(2)}€</td>
                <td style="color:#16a34a; font-weight:bold">${amort.toFixed(2)}€</td>
                <td><button onclick="eliminar(${l.id})" style="border:none;background:none;color:red;cursor:pointer;font-weight:bold">✕</button></td>
            </tr>`;
        });

        let mesesRest = MESES_TOTAL - mensualidades;
        let iM = I_AN / 12;
        let nCuota = mesesRest > 0 ? (deuda * iM * Math.pow(1 + iM, mesesRest)) / (Math.pow(1 + iM, mesesRest) - 1) : 0;
        
        document.getElementById('lista').innerHTML = html.reverse().join('');
        document.getElementById('tEdu').innerText = sEdu.toLocaleString('es-ES', {minimumFractionDigits:2}) + "€";
        document.getElementById('tPapas').innerText = sPapas.toLocaleString('es-ES', {minimumFractionDigits:2}) + "€";
        document.getElementById('tCap').innerText = sCap.toLocaleString('es-ES', {minimumFractionDigits:2}) + "€";
        document.getElementById('tPend').innerText = deuda.toLocaleString('es-ES', {minimumFractionDigits:2}) + "€";
        document.getElementById('valCuota').innerText = nCuota.toFixed(2) + "€";
        document.getElementById('valDesglose').innerHTML = `Interés: ${(deuda*iM).toFixed(2)}€ | Amortiza: ${(nCuota-(deuda*iM)).toFixed(2)}€<br><small>Restan ${mesesRest} cuotas</small>`;
    }

    // Configuración inicial
    document.getElementById('fecha').valueAsDate = new Date();
    fetchFromGitHub();
</script>
</body>
</html>
